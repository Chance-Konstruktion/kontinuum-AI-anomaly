name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }} · core ${{ matrix.core-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        # Two core versions on purpose: 0.6.0 predates get_diagnostics() and so
        # exercises the hasattr-guard / graceful-degradation path, while 0.6.3 is
        # the modern path this package pins. The version-matrix skew is exactly
        # what broke releases before there was CI (SPEC.md §5.1) — this keeps
        # both paths permanently green.
        core-version: ["0.6.0", "0.6.3"]
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm derives the version from tags/history.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Pin kontinuum-core for this matrix leg
        # Explicitly override the >=0.6.3 pin so the old-core guard path is
        # actually tested. pip honours the exact requested version.
        run: pip install "kontinuum-core==${{ matrix.core-version }}"

      - name: Show resolved versions
        run: |
          python -c "import sys, kontinuum_core, kontinuum_ai_anomaly as m; \
            print('python', sys.version.split()[0]); \
            print('kontinuum-core', kontinuum_core.__version__ if hasattr(kontinuum_core,'__version__') else '?'); \
            print('kontinuum-AI-anomaly', m.__version__)"

      - name: Run tests
        run: pytest -q

  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          # A recent interpreter on purpose: current mypy refuses to *analyse*
          # for 3.9 ("must be 3.10 or higher"), so pinning the lint job to the
          # oldest supported runtime would break it. 3.9 compatibility is
          # covered where it belongs — ruff's `target-version = "py39"` in
          # pyproject.toml for lint rules, and the test matrix above, which
          # actually imports and runs the package on 3.9.
          python-version: "3.12"

      - name: Install package + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" ruff mypy

      - name: ruff
        # The rule selection is correctness-focused (see [tool.ruff.lint] in
        # pyproject.toml), so any finding here is meant to be acted on.
        run: ruff check .

      - name: mypy
        # The package ships py.typed, so its annotations are a promise to
        # downstream users — this keeps that promise honest.
        run: mypy kontinuum_ai_anomaly --ignore-missing-imports

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
