name: Publish to PyPI

# Fires on a version tag push (e.g. `v0.7.0`). setuptools-scm turns that tag into
# the package version, so the release you build is exactly the tag you pushed —
# no hand-edited version string to forget. This is the automation whose absence
# meant a tagged release never actually reached PyPI (SPEC.md §5.1).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tags needed for setuptools-scm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kontinuum-AI-anomaly
    permissions:
      # Mandatory for OIDC Trusted Publishing — no API token/password stored.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
